appId: host.exp.exponent
---
- launchApp:
    clearState: false

# Esperar App Carregar
- assertVisible:
    text: "AindaTaAi"

# Fluxo de Login Hub
- tapOn: "Não tem conta? Cadastre-se"
- tapOn: "Nome Completo"
- inputText: "Hub Test User"
- tapOn: "Email"
- inputText: "hub_1769653284919@teste.com"
- tapOn: "Password"
- inputText: "123456"
- tapOn: "Cadastrar"
- assertVisible: "Quem é você?"
- tapOn: "Responsável (Hub)"
